<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>足し算の筆算</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --card-w: min(92vw, 360px);
    --dark: #111;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px;
  }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 16px;
    position: relative;
  }

  .titleRow {
    position: relative;
    min-height: 44px;
    margin-bottom: 8px;
  }

  .title {
    font-weight: 950;
    font-size: 22px;
    margin: 0;
    text-align: center;
    line-height: 44px;
  }

  .soundBtn {
    position: absolute;
    right: 0;
    top: 0;
    border: 0;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 950;
    cursor: pointer;
    background: #f1f1f1;
    color: var(--dark);
    line-height: 1;
  }

  .soundBtn.off {
    background: #e9e9e9;
    color: #666;
  }

  .soundIcon {
    font-size: 18px;
    line-height: 1;
  }

  .topModes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 4px 0 14px;
  }

  .modeBtn {
    border: 0;
    border-radius: 12px;
    padding: 12px 18px;
    min-width: 120px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    background: #ececec;
    color: var(--dark);
    transition: transform .12s ease, background .12s ease, color .12s ease;
  }

  .modeBtn.active {
    background: var(--dark);
    color: #fff;
  }

  .modeBtn:disabled,
  .soundBtn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .stage {
    display: flex;
    justify-content: center;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    padding: 12px;
    position: relative;
    aspect-ratio: 3 / 4;
    width: var(--card-w);
    overflow: hidden;
    margin: 0 auto;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 3px solid rgba(0,0,0,.06);
    pointer-events: none;
    z-index: 5;
  }

  .cardInner {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .calcArea {
    position: absolute;
    right: 9%;
    top: 50%;
    transform: translateY(-50%);
    width: clamp(180px, 44vw, 250px);
  }

  .sumRow {
    display: grid;
    grid-template-columns: clamp(42px, 9vw, 62px) clamp(48px, 10vw, 70px) clamp(76px, 16vw, 112px);
    align-items: end;
    justify-content: end;
    column-gap: 0;
  }

  .sumRow + .sumRow {
    margin-top: 2px;
  }

  .sumOp,
  .sumDigit {
    font-weight: 950;
    line-height: .88;
    color: #111;
    user-select: none;
  }

  .sumOp {
    font-size: clamp(50px, 11vw, 78px);
    text-align: center;
  }

  .sumDigit {
    font-size: clamp(84px, 18vw, 128px);
    text-align: right;
  }

  .ghost {
    visibility: hidden;
  }

  .sumLine {
    width: 100%;
    border-top: 6px solid rgba(17,17,17,.96);
    border-radius: 999px;
    margin: 10px 0 8px;
  }

  .answerValue {
    opacity: 0;
    transform: translateY(-8px) scale(.96);
    transition: opacity .14s ease, transform .14s ease;
  }

  .answerValue.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .answerValue.correct {
    color: #0f8a2b;
  }

  .messageArea {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .messageArea.show {
    display: flex;
  }

  .messageInner {
    background: rgba(255,255,255,.9);
    border-radius: 20px;
    padding: 20px 22px;
    box-shadow: 0 10px 24px rgba(0,0,0,.12);
    min-width: min(280px, 82%);
  }

  .messageTitle {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 950;
    line-height: 1.25;
    margin: 0;
    white-space: pre-line;
  }

  .messageSub {
    margin: 10px 0 0;
    font-size: 16px;
    font-weight: 800;
    color: #555;
    line-height: 1.6;
    white-space: pre-line;
  }

  .controls {
    display: flex;
    justify-content: center;
    margin-top: 16px;
  }

  .controls.hidden {
    display: none;
  }

  .mainBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 18px;
    background: var(--dark);
    color: #fff;
    min-width: 170px;
  }

  .mainBtn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .pad {
    max-width: 430px;
    margin: 16px auto 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .digitBtn {
    border: 0;
    border-radius: 16px;
    background: #fff;
    color: var(--dark);
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    min-height: 74px;
    font-size: 30px;
    font-weight: 950;
    cursor: pointer;
    transition: transform .08s ease, opacity .08s ease;
  }

  .digitBtn:active {
    transform: translateY(1px) scale(.99);
  }

  .digitBtn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-10px); }
    40%  { transform: translateX(10px); }
    60%  { transform: translateX(-8px); }
    80%  { transform: translateX(8px); }
    100% { transform: translateX(0); }
  }

  .cardInner.shake {
    animation: shake .22s ease;
  }

  @keyframes flashCorrect {
    0%   { filter: brightness(1); }
    50%  { filter: brightness(1.12); }
    100% { filter: brightness(1); }
  }

  .cardInner.flashCorrect {
    animation: flashCorrect .18s ease;
  }

  @media (max-width: 560px) {
  :root {
    --card-w: min(96vw, 390px);
  }

  .wrap {
    padding: 6px;
  }

  .panel {
    padding: 10px 8px 12px;
  }

  .titleRow {
    min-height: 92px;
    margin-bottom: 2px;
  }

  .title {
    line-height: 1.35;
    padding-top: 6px;
    font-size: 20px;
  }

  .soundBtn {
    top: 46px;
    right: 0;
    font-size: 13px;
    padding: 8px 10px;
  }

  .topModes {
    margin: 0 0 8px;
    gap: 8px;
  }

  .modeBtn {
    min-width: 104px;
    font-size: 14px;
    padding: 10px 12px;
  }

  .card {
    aspect-ratio: auto;
    height: clamp(300px, 44vh, 360px);
  }

  .calcArea {
    right: 4%;
    top: 24px;
    transform: none;
    width: clamp(220px, 64vw, 280px);
  }

  .sumRow {
    grid-template-columns: 34px 34px 88px;
  }

  .sumOp {
    font-size: clamp(42px, 10vw, 64px);
  }

  .sumDigit {
    font-size: clamp(72px, 16vw, 108px);
  }

  .sumLine {
    margin: 6px 0 4px;
  }

  .pad {
    margin: 8px auto 0;
    gap: 8px;
  }

  .digitBtn {
    min-height: 62px;
    font-size: 26px;
  }

  .controls {
    margin-top: 10px;
  }
}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="titleRow">
        <p class="title">足し算の筆算</p>
        <button id="soundBtn" class="soundBtn" type="button" aria-pressed="true" title="おとの オンオフ">
          <span id="soundIcon" class="soundIcon">🔊</span>
          <span id="soundLabel">おと ON</span>
        </button>
      </div>

      <div class="topModes" aria-label="モードせんたく">
        <button id="practiceModeBtn" class="modeBtn active" type="button">れんしゅう</button>
        <button id="challengeModeBtn" class="modeBtn" type="button">30びょう</button>
      </div>

      <div class="stage">
        <div class="card">
          <div id="cardInner" class="cardInner">
            <div id="calcArea" class="calcArea">
              <div class="sumRow">
                <div class="sumOp ghost">+</div>
                <div class="sumDigit ghost">8</div>
                <div id="topNum" class="sumDigit">6</div>
              </div>

              <div class="sumRow">
                <div class="sumOp">+</div>
                <div class="sumDigit ghost">8</div>
                <div id="bottomNum" class="sumDigit">3</div>
              </div>

              <div class="sumLine"></div>

              <div class="sumRow">
                <div class="sumOp ghost">+</div>
                <div class="sumDigit ghost">8</div>
                <div id="answerNum" class="sumDigit answerValue">9</div>
              </div>
            </div>

            <div id="messageArea" class="messageArea">
              <div class="messageInner">
                <p id="messageTitle" class="messageTitle">30びょう</p>
                <p id="messageSub" class="messageSub">スタートで はじめるよ</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="controls" class="controls hidden">
        <button id="mainBtn" class="mainBtn" type="button">スタート</button>
      </div>

      <div class="pad" id="pad">
        <button class="digitBtn" type="button" data-digit="1">1</button>
        <button class="digitBtn" type="button" data-digit="2">2</button>
        <button class="digitBtn" type="button" data-digit="3">3</button>
        <button class="digitBtn" type="button" data-digit="4">4</button>
        <button class="digitBtn" type="button" data-digit="5">5</button>
        <button class="digitBtn" type="button" data-digit="6">6</button>
        <button class="digitBtn" type="button" data-digit="7">7</button>
        <button class="digitBtn" type="button" data-digit="8">8</button>
        <button class="digitBtn" type="button" data-digit="9">9</button>
      </div>
    </div>
  </div>

<script>
  const STORAGE_SOUND_KEY = "tateTasizanSoundOn";
  const STORAGE_BEST_KEY = "tateTasizanBest30";

  const state = {
    mode: "practice",
    current: null,
    practiceLocked: false,
    challengeRunning: false,
    challengeBusy: false,
    score: 0,
    misses: 0,
    best: Number(localStorage.getItem(STORAGE_BEST_KEY) || 0),
    soundOn: localStorage.getItem(STORAGE_SOUND_KEY) !== "off",
    timerId: null,
    nextId: null,
    endAt: 0
  };

  const soundBtn = document.getElementById("soundBtn");
  const soundIcon = document.getElementById("soundIcon");
  const soundLabel = document.getElementById("soundLabel");

  const practiceModeBtn = document.getElementById("practiceModeBtn");
  const challengeModeBtn = document.getElementById("challengeModeBtn");

  const controls = document.getElementById("controls");
  const mainBtn = document.getElementById("mainBtn");

  const cardInner = document.getElementById("cardInner");

  const calcArea = document.getElementById("calcArea");
  const messageArea = document.getElementById("messageArea");
  const messageTitle = document.getElementById("messageTitle");
  const messageSub = document.getElementById("messageSub");

  const topNum = document.getElementById("topNum");
  const bottomNum = document.getElementById("bottomNum");
  const answerNum = document.getElementById("answerNum");

  const digitButtons = Array.from(document.querySelectorAll(".digitBtn"));

  let audioCtx = null;

  function getAudioCtx() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;
    if (!audioCtx) audioCtx = new AudioContextClass();
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function beep({ freq = 880, duration = 0.08, type = "sine", gain = 0.03, when = 0 }) {
    if (!state.soundOn) return;
    const ctx = getAudioCtx();
    if (!ctx) return;

    const now = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);

    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(amp);
    amp.connect(ctx.destination);

    osc.start(now);
    osc.stop(now + duration + 0.02);
  }

  function playCorrectSound() {
    beep({ freq: 880, duration: 0.08, type: "sine", gain: 0.035, when: 0 });
    beep({ freq: 1320, duration: 0.1, type: "sine", gain: 0.03, when: 0.08 });
  }

  function playWrongSound() {
    beep({ freq: 180, duration: 0.12, type: "triangle", gain: 0.03, when: 0 });
  }

  function clearTimers() {
    if (state.timerId) {
      clearInterval(state.timerId);
      state.timerId = null;
    }
    if (state.nextId) {
      clearTimeout(state.nextId);
      state.nextId = null;
    }
  }

  function setPadDisabled(disabled) {
    digitButtons.forEach(btn => {
      btn.disabled = disabled;
    });
  }

  function setModeButtons() {
    practiceModeBtn.classList.toggle("active", state.mode === "practice");
    challengeModeBtn.classList.toggle("active", state.mode === "challenge");
  }

  function updateSoundButton() {
    soundBtn.classList.toggle("off", !state.soundOn);
    soundBtn.setAttribute("aria-pressed", state.soundOn ? "true" : "false");
    soundIcon.textContent = state.soundOn ? "🔊" : "🔇";
    soundLabel.textContent = state.soundOn ? "おと ON" : "おと OFF";
  }

  function showCalc() {
    calcArea.style.display = "block";
    messageArea.classList.remove("show");
  }

  function showMessage(title, sub = "") {
    calcArea.style.display = "none";
    messageArea.classList.add("show");
    messageTitle.textContent = title;
    messageSub.textContent = sub;
  }

  function hideAnswer() {
    answerNum.textContent = state.current ? String(state.current.answer) : "";
    answerNum.classList.remove("show", "correct");
  }

  function showAnswer(value) {
    answerNum.textContent = String(value);
    answerNum.classList.add("show", "correct");
  }

  function shakeCard() {
    cardInner.classList.remove("shake");
    void cardInner.offsetWidth;
    cardInner.classList.add("shake");
  }

  function flashCorrect() {
    cardInner.classList.remove("flashCorrect");
    void cardInner.offsetWidth;
    cardInner.classList.add("flashCorrect");
  }

  function pickProblem() {
    let a = Math.floor(Math.random() * 8) + 1;
    let b = Math.floor(Math.random() * (9 - a)) + 1;
    if (Math.random() < 0.5) [a, b] = [b, a];
    return { top: a, bottom: b, answer: a + b };
  }

  function setProblem(problem) {
    state.current = problem;
    topNum.textContent = String(problem.top);
    bottomNum.textContent = String(problem.bottom);
    hideAnswer();
    showCalc();
  }

  function updateControls() {
    if (state.mode === "practice") {
      controls.classList.add("hidden");
    } else {
      controls.classList.remove("hidden");
    }
  }

  function nextPracticeProblem() {
    state.practiceLocked = false;
    setPadDisabled(false);
    setProblem(pickProblem());
  }

  function resetPractice() {
    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;
    state.practiceLocked = false;

    updateControls();
    setPadDisabled(false);
    setProblem(pickProblem());
  }

  function resetChallengeReady() {
    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;
    state.score = 0;
    state.misses = 0;

    updateControls();
    setPadDisabled(true);

    mainBtn.disabled = false;
    mainBtn.textContent = "スタート";

    showMessage("30びょう", "スタートで はじめるよ");
  }

  function setMode(mode) {
    clearTimers();
    state.mode = mode;
    setModeButtons();
    updateControls();

    if (mode === "practice") {
      resetPractice();
    } else {
      resetChallengeReady();
    }
  }

  function endChallenge() {
    if (!state.challengeRunning) return;

    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;

    setPadDisabled(true);

    const isNewBest = state.score > state.best;
    if (isNewBest) {
      state.best = state.score;
      localStorage.setItem(STORAGE_BEST_KEY, String(state.best));
    }

    const subText = isNewBest
      ? `ミス ${state.misses}かい\nベスト こうしん！`
      : `ミス ${state.misses}かい\nベスト ${state.best}もん`;

    showMessage(`${state.score}もん\nできた！`, subText);

    mainBtn.disabled = false;
    mainBtn.textContent = "もういちど";
  }

  function startChallenge() {
    clearTimers();

    state.challengeRunning = true;
    state.challengeBusy = false;
    state.score = 0;
    state.misses = 0;
    state.endAt = Date.now() + 30000;

    mainBtn.disabled = true;
    mainBtn.textContent = "ちょうせん中";

    setPadDisabled(false);
    setProblem(pickProblem());

    state.timerId = setInterval(() => {
      if (Date.now() >= state.endAt) {
        endChallenge();
      }
    }, 100);
  }

  function scheduleNextPractice(ms) {
    clearTimeout(state.nextId);
    state.nextId = setTimeout(() => {
      if (state.mode !== "practice") return;
      nextPracticeProblem();
    }, ms);
  }

  function unlockSameChallengeProblem(ms) {
    clearTimeout(state.nextId);
    state.nextId = setTimeout(() => {
      if (!state.challengeRunning) return;
      if (Date.now() >= state.endAt) {
        endChallenge();
        return;
      }
      state.challengeBusy = false;
      setPadDisabled(false);
    }, ms);
  }

  function scheduleNextChallenge(ms) {
    clearTimeout(state.nextId);
    state.nextId = setTimeout(() => {
      if (!state.challengeRunning) return;

      if (Date.now() >= state.endAt) {
        endChallenge();
        return;
      }

      state.challengeBusy = false;
      setPadDisabled(false);
      setProblem(pickProblem());
    }, ms);
  }

  function handlePracticeAnswer(value) {
    if (!state.current || state.practiceLocked) return;

    if (value === state.current.answer) {
      state.practiceLocked = true;
      setPadDisabled(true);
      showAnswer(value);
      flashCorrect();
      playCorrectSound();
      scheduleNextPractice(260);
    } else {
      shakeCard();
      playWrongSound();
    }
  }

  function handleChallengeAnswer(value) {
    if (!state.current || !state.challengeRunning || state.challengeBusy) return;

    state.challengeBusy = true;
    setPadDisabled(true);

    if (value === state.current.answer) {
      state.score += 1;
      showAnswer(value);
      flashCorrect();
      playCorrectSound();
      scheduleNextChallenge(150);
    } else {
      state.misses += 1;
      shakeCard();
      playWrongSound();
      unlockSameChallengeProblem(180);
    }
  }

  function handleDigit(value) {
    if (state.mode === "practice") {
      handlePracticeAnswer(value);
    } else {
      handleChallengeAnswer(value);
    }
  }

  digitButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      handleDigit(Number(btn.dataset.digit));
    });
  });

  mainBtn.addEventListener("click", () => {
    if (state.mode === "challenge" && !state.challengeRunning) {
      startChallenge();
    }
  });

  practiceModeBtn.addEventListener("click", () => {
    if (state.mode !== "practice") {
      setMode("practice");
    }
  });

  challengeModeBtn.addEventListener("click", () => {
    if (state.mode !== "challenge") {
      setMode("challenge");
    }
  });

  soundBtn.addEventListener("click", () => {
    state.soundOn = !state.soundOn;
    localStorage.setItem(STORAGE_SOUND_KEY, state.soundOn ? "on" : "off");
    updateSoundButton();
  });

  document.addEventListener("keydown", (e) => {
    if (e.repeat) return;

    if (/^[1-9]$/.test(e.key)) {
      handleDigit(Number(e.key));
      return;
    }

    if (e.key === "Enter" && state.mode === "challenge" && !state.challengeRunning) {
      startChallenge();
    }
  });

  updateSoundButton();
  setMode("practice");
</script>
</body>
</html>
